name: Build CleanMyMac

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build
        run: |
          xcodebuild \
            -project CleanMyMac.xcodeproj \
            -scheme CleanMyMac \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package DMG
        run: |
          APP_PATH="build/Build/Products/Debug/CleanMyMac.app"
          hdiutil create \
            -volname "CleanMyMac" \
            -srcfolder "$APP_PATH" \
            -ov \
            -format UDZO \
            CleanMyMac.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: CleanMyMac
          path: CleanMyMac.dmg
          retention-days: 7

      - name: Run Tests
        run: |
          xcodebuild \
            -project CleanMyMac.xcodeproj \
            -scheme CleanMyMacTests \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            test || true
