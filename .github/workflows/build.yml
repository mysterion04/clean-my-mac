name: Build cleann-mi-maccc

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Generate App Icon
        run: |
          cat << 'SWIFTEOF' > /tmp/gen_icon.swift
          import AppKit
          import Foundation

          func makeIcon(size: Int, path: String) {
              let img = NSImage(size: NSSize(width: size, height: size))
              img.lockFocus()

              let r = CGFloat(size) * 0.20
              let rect = NSRect(x: 0, y: 0, width: size, height: size)
              let bg = NSBezierPath(roundedRect: rect, xRadius: r, yRadius: r)
              NSColor(red: 0.08, green: 0.08, blue: 0.10, alpha: 1.0).setFill()
              bg.fill()

              let font = NSFont.systemFont(ofSize: CGFloat(size) * 0.65)
              let attrs: [NSAttributedString.Key: Any] = [.font: font]
              let emoji = "🧽" as NSString
              let ts = emoji.size(withAttributes: attrs)
              let x = (CGFloat(size) - ts.width) / 2
              let y = (CGFloat(size) - ts.height) / 2
              emoji.draw(at: NSPoint(x: x, y: y), withAttributes: attrs)

              img.unlockFocus()

              guard let tiff = img.tiffRepresentation,
                    let bm = NSBitmapImageRep(data: tiff),
                    let png = bm.representation(using: .png, properties: [:]) else { return }
              try? png.write(to: URL(fileURLWithPath: path))
              print("  ✓ \((path as NSString).lastPathComponent)")
          }

          let dest = "CleanMyMac/Assets.xcassets/AppIcon.appiconset"
          let specs: [(Int, String)] = [
              (16,   "icon_16x16.png"),
              (32,   "icon_16x16@2x.png"),
              (32,   "icon_32x32.png"),
              (64,   "icon_32x32@2x.png"),
              (128,  "icon_128x128.png"),
              (256,  "icon_128x128@2x.png"),
              (256,  "icon_256x256.png"),
              (512,  "icon_256x256@2x.png"),
              (512,  "icon_512x512.png"),
              (1024, "icon_512x512@2x.png"),
          ]
          for (size, name) in specs {
              makeIcon(size: size, path: "\(dest)/\(name)")
          }
          SWIFTEOF
          swift /tmp/gen_icon.swift

      - name: Build
        run: |
          xcodebuild \
            -project CleanMyMac.xcodeproj \
            -scheme CleanMyMac \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package DMG
        run: |
          APP_PATH="build/Build/Products/Debug/CleanMyMac.app"
          hdiutil create \
            -volname "cleann-mi-maccc" \
            -srcfolder "$APP_PATH" \
            -ov \
            -format UDZO \
            cleann-mi-maccc.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: cleann-mi-maccc
          path: cleann-mi-maccc.dmg
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes || true
          gh release create latest \
            --title "cleann-mi-maccc — Latest Build" \
            --notes "Auto-built from \`main\` ($(date -u '+%Y-%m-%d %H:%M UTC'))" \
            --latest \
            cleann-mi-maccc.dmg

      - name: Run Tests
        run: |
          xcodebuild \
            -project CleanMyMac.xcodeproj \
            -scheme CleanMyMacTests \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            test || true
