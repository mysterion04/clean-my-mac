name: Build CleanMyMac

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Generate App Icon
        run: |
          python3 << 'PYEOF'
          import os
          from AppKit import (
              NSImage, NSFont, NSString, NSColor, NSBezierPath,
              NSBitmapImageRep, NSFontAttributeName, NSBitmapImageFileTypePNG
          )
          from Foundation import NSMakeRect, NSMakeSize, NSMakePoint

          def make_icon(size, path):
              img = NSImage.alloc().initWithSize_(NSMakeSize(size, size))
              img.lockFocus()

              # Dark rounded background
              r = size * 0.20
              bg = NSBezierPath.bezierPathWithRoundedRect_xRadius_yRadius_(
                  NSMakeRect(0, 0, size, size), r, r)
              NSColor.colorWithRed_green_blue_alpha_(0.08, 0.08, 0.10, 1.0).setFill()
              bg.fill()

              # Sponge emoji
              font = NSFont.systemFontOfSize_(size * 0.65)
              attrs = {NSFontAttributeName: font}
              s = NSString.stringWithString_("🧽")
              ts = s.sizeWithAttributes_(attrs)
              x = (size - ts.width) / 2
              y = (size - ts.height) / 2
              s.drawAtPoint_withAttributes_(NSMakePoint(x, y), attrs)

              img.unlockFocus()

              tiff = img.TIFFRepresentation()
              bm = NSBitmapImageRep.imageRepWithData_(tiff)
              png = bm.representationUsingType_properties_(NSBitmapImageFileTypePNG, {})
              png.writeToFile_atomically_(path, True)
              print(f"  ✓ {os.path.basename(path)}")

          dest = "CleanMyMac/Assets.xcassets/AppIcon.appiconset"
          specs = [
              (16,   "icon_16x16.png"),
              (32,   "icon_16x16@2x.png"),
              (32,   "icon_32x32.png"),
              (64,   "icon_32x32@2x.png"),
              (128,  "icon_128x128.png"),
              (256,  "icon_128x128@2x.png"),
              (256,  "icon_256x256.png"),
              (512,  "icon_256x256@2x.png"),
              (512,  "icon_512x512.png"),
              (1024, "icon_512x512@2x.png"),
          ]
          for size, name in specs:
              make_icon(size, f"{dest}/{name}")
          PYEOF

      - name: Build
        run: |
          xcodebuild \
            -project CleanMyMac.xcodeproj \
            -scheme CleanMyMac \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package DMG
        run: |
          APP_PATH="build/Build/Products/Debug/CleanMyMac.app"
          hdiutil create \
            -volname "cleann-mi-maccc" \
            -srcfolder "$APP_PATH" \
            -ov \
            -format UDZO \
            cleann-mi-maccc.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: cleann-mi-maccc
          path: cleann-mi-maccc.dmg
          retention-days: 30

      - name: Run Tests
        run: |
          xcodebuild \
            -project CleanMyMac.xcodeproj \
            -scheme CleanMyMacTests \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            test || true
